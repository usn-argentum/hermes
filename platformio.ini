; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_flags = 
    -D RCLC_EXECUTOR_MAX_NUMBER_OF_HANDLES=4
    -D RMW_UXRCE_MAX_NODES=2
    -D RMW_UXRCE_MAX_PUBLISHERS=2
    -D RMW_UXRCE_MAX_SUBSCRIBERS=2

board_microros_transport = serial
board_microros_distro = jazzy
lib_deps = 
	https://github.com/micro-ROS/micro_ros_platformio

monitor_speed = 115200
upload_port = /dev/ttyACM1
; might work to automatically add setup() and loop() when compiled standalone
src_build_flags = -D BUILDING_LOCAL_TEST
